name: Build ws-scrcpy Standalone

on:
  workflow_dispatch: # Memungkinkan kita klik tombol "Run workflow" manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone ws-scrcpy Repository
        uses: actions/checkout@v4
        with:
          repository: NetrisTV/ws-scrcpy

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Versi stabil

      - name: Install Dependencies
        run: npm install

      - name: Patch Native Modules
        run: |
          # Hapus modul native x86 agar tidak crash di ARM64 Mido
          rm -rf node_modules/node-pty node_modules/ios-device-lib
          # Buat mock module untuk node-pty
          mkdir -p node_modules/node-pty
          echo '{"name":"node-pty","main":"index.js"}' > node_modules/node-pty/package.json
          echo 'module.exports = { spawn: () => ({ on: () => {}, write: () => {}, resize: () => {}, kill: () => {} }) };' > node_modules/node-pty/index.js
          # Buat mock module untuk ios-device-lib
          mkdir -p node_modules/ios-device-lib
          echo '{"name":"ios-device-lib","main":"index.js"}' > node_modules/ios-device-lib/package.json
          echo 'module.exports = { IOSDeviceLib: class { on() {} start() {} stop() {} } };' > node_modules/ios-device-lib/index.js

      - name: Build Frontend Client
        run: npm run dist

      - name: Package Standalone File
        run: |
          mkdir build-output
          # Pindahkan folder dist, node_modules dan package.json ke output
          cp -r dist node_modules package.json build-output/
          cd build-output
          tar -czf ../ws-scrcpy-mido.tar.gz .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ws-scrcpy-mido-build
          path: ws-scrcpy-mido.tar.gz
